# KUIO — Compila il motore brandizzato per Windows, automaticamente, sui server di GitHub.
# COME USARLO (Antonio, 3 clic):
#   1. Vai su github.com/tonimanot71-bot/kuio -> scheda "Actions"
#   2. Scegli "Build KUIO (Windows)" a sinistra
#   3. Clicca "Run workflow"
# Dopo ~15-25 minuti, nella pagina del workflow trovi "kuio-windows" da scaricare:
# contiene kuio.exe gia BRANDIZZATO (niente "zeroclaw" da nessuna parte) + dashboard web.
# NB: richiede che la cartella kuio-modifications/ sia committata nel fork (branding + script).

name: Build KUIO (Windows)

on:
  workflow_dispatch:        # avvio manuale (il bottone "Run workflow")
  push:
    branches: [ master ]
    paths: [ "kuio-modifications/**", ".github/workflows/build-kuio.yml" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Installa Rust (stable, via rustup ufficiale)
        # Evitiamo dtolnay/rust-toolchain perche' codeload.github.com fallisce
        # ricorrentemente il download dell'archivio (problema CDN GitHub, 2026-05-26).
        # rustup-init.exe e' sul CDN Rust (win.rustup.rs) e funziona in modo affidabile.
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable --profile minimal --no-modify-path
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.cargo\bin"
          & "$env:USERPROFILE\.cargo\bin\rustc.exe" --version

      - name: Python per gli script di branding
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Applica branding KUIO (testi, icone, logo)
        run: python kuio-modifications/branding/apply-branding.py
        shell: bash

      - name: Applica branding PROFONDO + patch + rinomina crate
        run: python kuio-modifications/branding/deep-branding.py
        shell: bash

      - name: Compila il motore (release)
        run: cargo build --release --features whatsapp-web

      - name: Rinomina in kuio.exe e prepara il pacchetto
        run: |
          mkdir kuio-out
          if exist target\release\kuio.exe ( copy target\release\kuio.exe kuio-out\kuio.exe ) else ( copy target\release\zeroclaw.exe kuio-out\kuio.exe )
          if exist web\dist xcopy /E /I web\dist kuio-out\web\dist
        shell: cmd

      - name: Pubblica il risultato (scaricabile)
        uses: actions/upload-artifact@v4
        with:
          name: kuio-windows
          path: kuio-out/
